<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News App</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/app.css">
    
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar p-3">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="fa-solid fa-newspaper"></i> News App
            </span>
        </div>
    </nav>

    <!-- Search -->
    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="input-group">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search news..." autocomplete="off">
                    <button class="btn btn-accent" id="searchBtn">
                        <i class="fa fa-search"></i>
                    </button>
                </div>
                <small id="errorMsg" class="error"></small>
            </div>
        </div>

        <!-- Category Filters -->
        <div class="row mt-3">
            <div class="col-12 d-flex flex-wrap gap-1">
                <button class="btn category-btn" data-category="general">General</button>
                <button class="btn category-btn" data-category="sports">Sports</button>
                <button class="btn category-btn" data-category="technology">Technology</button>
                <button class="btn category-btn" data-category="business">Business</button>
                <button class="btn category-btn" data-category="entertainment">Entertainment</button>
                <button class="btn category-btn" data-category="health">Health</button>
                <button class="btn category-btn" data-category="science">Science</button>
            </div>
        </div>

        <!-- News Container -->
        <div class="row mt-4" id="newsContainer"></div>
    </div>

    <script src="./js/app.js"></script>
</body>

</html>
